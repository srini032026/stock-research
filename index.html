<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IERP — India Equity Research Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #070C17;
  --surf:     #0D1525;
  --surf2:    #121E32;
  --surf3:    #1A2A42;
  --border:   #1E3050;
  --border2:  #253850;
  --text:     #C8D8F0;
  --dim:      #5A7A9A;
  --dim2:     #3A5A7A;
  --accent:   #00E5B4;
  --accent2:  #00B48C;
  --buy:      #00C46C;
  --hold:     #F5A623;
  --sell:     #FF4757;
  --navy:     #1B3A6B;
  --purple:   #6C3CE1;
  --r: 8px;
  --ff: 'Outfit', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--ff);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surf);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── AUTH OVERLAY ── */
#auth{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;}
.auth-box{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:48px 44px;width:420px;max-width:95vw;}
.auth-logo{font-size:13px;font-weight:700;letter-spacing:.15em;color:var(--accent);margin-bottom:8px;font-family:var(--mono);}
.auth-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--dim);margin-bottom:32px;line-height:1.5;}
.auth-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:6px;}
.auth-input{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{width:100%;background:var(--accent);color:#070C17;border:none;border-radius:var(--r);padding:12px;font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;margin-top:4px;}
.auth-btn:hover{background:var(--accent2);}
.auth-btn:active{transform:scale(.98);}
.auth-err{background:#FF475715;border:1px solid #FF475750;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--sell);margin-bottom:16px;display:none;}
.auth-link{font-size:12px;color:var(--accent);cursor:pointer;text-align:center;margin-top:16px;display:block;}
.auth-note{font-size:11px;color:var(--dim2);margin-top:12px;line-height:1.6;background:var(--surf2);border-radius:var(--r);padding:10px 12px;}
.auth-sep{height:1px;background:var(--border);margin:24px 0;}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;display:none;}
/* Sidebar */
#sidebar{width:200px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.brand-mark{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.1em;}
.brand-name{font-size:15px;font-weight:800;color:var(--text);margin-top:2px;}
.brand-sub{font-size:10px;color:var(--dim2);margin-top:2px;}
nav{flex:1;padding:12px 8px;}
.nav-section{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);padding:8px 10px 4px;}
.nav-btn{width:100%;text-align:left;padding:9px 12px;border-radius:var(--r);border:none;background:transparent;color:var(--dim);font-family:var(--ff);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;margin-bottom:2px;}
.nav-btn:hover{background:var(--surf2);color:var(--text);}
.nav-btn.active{background:linear-gradient(135deg,var(--accent)15,var(--accent2)08);color:var(--accent);font-weight:700;}
.nav-icon{font-size:15px;flex-shrink:0;}
.sidebar-stats{padding:14px 16px;border-top:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--dim2);}
.stat-row{display:flex;gap:12px;margin-top:4px;}
.stat-buy{color:#00C46C;}.stat-hold{color:#F5A623;}.stat-sell{color:#FF4757;}
.sidebar-bottom{padding:10px 8px;}
.settings-btn{width:100%;text-align:left;padding:8px 12px;border-radius:var(--r);border:none;background:transparent;color:var(--dim);font-family:var(--ff);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;}
.settings-btn:hover{background:var(--surf2);color:var(--text);}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.page-title{font-size:15px;font-weight:700;color:var(--text);flex:1;}
.search-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.search-row{display:flex;gap:8px;}
.ticker-input{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 14px;color:var(--text);font-family:var(--mono);font-size:13px;width:200px;outline:none;transition:border-color .2s;text-transform:uppercase;}
.ticker-input:focus{border-color:var(--accent);}
.ticker-input::placeholder{text-transform:none;color:var(--dim2);}
.analyse-btn{background:var(--accent);color:#070C17;border:none;border-radius:var(--r);padding:8px 18px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap;}
.analyse-btn:hover{background:var(--accent2);}
.analyse-btn:disabled{background:var(--surf3);color:var(--dim);cursor:not-allowed;}
.search-hint{font-size:10px;color:var(--dim2);}
.sector-select{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--text);font-family:var(--ff);font-size:13px;cursor:pointer;outline:none;}

/* Progress */
#progress{background:linear-gradient(135deg,#00E5B415,#00B48C08);border-bottom:1px solid #00E5B430;padding:10px 20px;display:none;flex-shrink:0;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-step{font-size:12px;font-weight:600;color:var(--accent);}
.prog-pct{font-family:var(--mono);font-size:11px;color:var(--accent);}
.prog-bar{background:var(--surf3);border-radius:999px;height:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .4s ease;}

/* Error */
#error-bar{background:#FF475710;border-bottom:1px solid #FF475730;padding:10px 20px;display:none;flex-shrink:0;}
.err-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.err-text{font-size:12px;color:var(--sell);white-space:pre-wrap;line-height:1.5;}
.err-close{background:none;border:none;color:var(--sell);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;}

/* Content */
#content{flex:1;overflow:auto;}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:40px;}
.empty-icon{font-size:52px;}
.empty-title{font-size:20px;font-weight:800;color:var(--text);}
.empty-sub{font-size:13px;color:var(--dim);}
.ticker-chips{display:flex;flex-wrap:wrap;gap:6px;max-width:580px;justify-content:center;margin-top:8px;}
.chip{background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;font-family:var(--mono);}
.empty-note{font-size:11px;color:var(--dim2);}

/* ── WATCHLIST TABLE ── */
.table-wrap{padding:16px;height:100%;overflow:auto;}
.wl-table-outer{border-radius:10px;border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.wl-scroll{overflow-x:auto;}
table{border-collapse:collapse;width:100%;min-width:1400px;}
thead th{padding:9px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:1;}
.th-price{background:#0D1525;}
.th-val{background:#141030;}
.th-tech{background:#0A1F30;}
.th-ret{background:#0A1E28;}
.th-act{background:#0D1525;}
tbody tr{transition:background .1s;}
tbody tr:nth-child(even){background:var(--surf2);}
tbody tr:hover{background:var(--surf3)!important;}
td{padding:8px 10px;font-size:12px;border-right:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.td-ticker{font-family:var(--mono);font-weight:700;}
.td-ticker button{color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--mono);font-weight:700;font-size:13px;text-decoration:underline;text-underline-offset:2px;}
.td-num{font-family:var(--mono);text-align:right;}
.td-center{text-align:center;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--border2);font-size:16px;line-height:1;transition:color .15s;}
.del-btn:hover{color:var(--sell);}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;font-family:var(--mono);}
.badge-buy{background:#00C46C20;color:#00C46C;border:1px solid #00C46C40;}
.badge-hold{background:#F5A62320;color:#F5A623;border:1px solid #F5A62340;}
.badge-sell{background:#FF475720;color:#FF4757;border:1px solid #FF475740;}
.badge-under{background:#00C46C15;color:#00C46C;}
.badge-fair{background:#3B82F615;color:#60A5FA;}
.badge-over{background:#FF475715;color:#FF4757;}
.badge-sector{background:var(--surf3);color:var(--dim);border:1px solid var(--border);}

/* CAGR badges */
.cagr-25{background:#0B4F26;color:#fff;}.cagr-20{background:#166534;color:#fff;}
.cagr-15{background:#15803D;color:#fff;}.cagr-12{background:#16A34A;color:#fff;}
.cagr-8{background:#D97706;color:#fff;}.cagr-0{background:#C2410C;color:#fff;}
.cagr-neg{background:#991B1B;color:#fff;}.cagr-na{background:var(--surf3);color:var(--dim);}
.rsi-low{color:#00C46C;font-weight:700;}.rsi-high{color:#FF4757;font-weight:700;}.rsi-mid{color:var(--text);}
.vs200-pos{color:#00C46C;font-weight:600;}.vs200-neg{color:#FF4757;font-weight:600;}
.entry-ok{color:#00C46C;}.entry-warn{color:#F5A623;}.entry-no{color:#FF4757;}

/* ── HEATMAP VIEWS ── */
.hm-wrap{padding:16px;height:100%;display:flex;flex-direction:column;overflow:auto;}
.hm-legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.hm-legend-label{font-size:10px;font-weight:700;color:var(--dim);margin-right:4px;}
.hm-panels{display:flex;gap:14px;flex:1;min-height:360px;}
.hm-panel{flex:1;background:var(--surf);border-radius:12px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-width:180px;}
.hm-panel-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.hm-panel-title{font-weight:800;font-size:15px;color:#fff;}
.hm-panel-avg{font-size:11px;color:rgba(255,255,255,.6);font-family:var(--mono);}
.hm-cells{padding:12px;display:flex;flex-wrap:wrap;gap:8px;flex:1;align-content:flex-start;overflow-y:auto;}
.hm-cell{border-radius:10px;padding:12px 14px;cursor:pointer;min-width:110px;min-height:95px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .12s,box-shadow .12s,filter .12s;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0;}
.hm-cell:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.5);filter:brightness(1.1);}
.hm-cell-tk{font-weight:800;font-size:14px;}
.hm-cell-sec{font-size:10px;opacity:.65;margin-top:2px;}
.hm-cell-cagr{font-size:24px;font-weight:900;line-height:1;margin:4px 0;font-family:var(--mono);}
.hm-cell-bhs{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:rgba(0,0,0,.3);display:inline-block;}

/* BHS heatmap */
.bhs-wrap{padding:16px;overflow:auto;display:flex;flex-direction:column;gap:12px;}
.bhs-group{background:var(--surf);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.bhs-head{padding:10px 16px;display:flex;align-items:center;gap:10px;}
.bhs-head-title{font-weight:800;font-size:15px;color:#fff;}
.bhs-body{padding:12px;display:flex;flex-wrap:wrap;gap:8px;}
.bhs-empty{color:var(--dim);font-size:13px;padding:4px;}
.bhs-card{border-radius:10px;padding:10px 12px;cursor:pointer;min-width:110px;display:flex;flex-direction:column;gap:4px;transition:transform .12s;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.bhs-card:hover{transform:scale(1.05);}

/* ── SETTINGS MODAL ── */
#settings-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.settings-box{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.settings-title{font-size:20px;font-weight:800;margin-bottom:24px;}
.settings-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:6px;margin-top:16px;}
.settings-input{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--ff);font-size:13px;outline:none;transition:border-color .2s;}
.settings-input:focus{border-color:var(--accent);}
.settings-row{display:flex;gap:10px;margin-top:20px;}
.settings-save{flex:1;background:var(--accent);color:#070C17;border:none;border-radius:var(--r);padding:10px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;}
.settings-cancel{background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:10px 16px;font-family:var(--ff);font-size:13px;cursor:pointer;}
.settings-msg{font-size:12px;color:var(--accent);margin-top:8px;display:none;}
.settings-note{font-size:11px;color:var(--dim2);margin-top:8px;line-height:1.6;}
.settings-sep{height:1px;background:var(--border);margin:24px 0;}
.logout-btn{width:100%;background:var(--surf2);border:1px solid var(--sell)30;color:var(--sell);border-radius:var(--r);padding:10px;font-family:var(--ff);font-size:13px;cursor:pointer;margin-top:16px;}
.model-select{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--ff);font-size:13px;outline:none;cursor:pointer;}
.model-select:focus{border-color:var(--accent);}

/* ── DRAWER ── */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;}
#drawer{position:fixed;right:-820px;top:0;width:min(820px,95vw);height:100%;background:var(--surf);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-12px 0 48px rgba(0,0,0,.5);overflow:hidden;}
#drawer.open{right:0;}
.drawer-head{background:linear-gradient(135deg,#0A1525,#0F2040);padding:18px 20px;flex-shrink:0;border-bottom:1px solid var(--border);}
.drawer-top{display:flex;justify-content:space-between;align-items:flex-start;}
.drawer-tk-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.drawer-tk{font-size:24px;font-weight:900;color:var(--text);font-family:var(--mono);}
.drawer-meta{font-size:12px;color:var(--dim);}
.drawer-close{background:none;border:none;color:var(--dim);font-size:26px;cursor:pointer;line-height:1;transition:color .15s;}
.drawer-close:hover{color:var(--text);}
.cagr-cards{display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0;}
.cagr-card{padding:14px 16px;text-align:center;border-right:1px solid rgba(255,255,255,.08);}
.cagr-card-lbl{font-size:10px;opacity:.7;font-weight:600;margin-bottom:4px;}
.cagr-card-val{font-size:30px;font-weight:900;line-height:1;font-family:var(--mono);}
.cagr-card-sub{font-size:10px;opacity:.5;margin-top:3px;font-family:var(--mono);}
.narrative-bar{background:#00C46C0C;border-bottom:1px solid #00C46C20;padding:10px 18px;font-size:12px;color:#6EE7B7;line-height:1.6;flex-shrink:0;}
.drawer-body{flex:1;overflow-y:auto;padding:0 18px 24px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;margin-top:20px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.kv-table{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:4px;}
.kv-row{display:flex;border-bottom:1px solid var(--border);}
.kv-row:last-child{border-bottom:none;}
.kv-label{width:45%;padding:6px 10px;font-size:12px;color:var(--dim);font-weight:500;border-right:1px solid var(--border);}
.kv-val{flex:1;padding:6px 10px;font-size:12px;color:var(--text);}
.kv-row:nth-child(even){background:var(--surf2);}
.g-table{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;font-size:12px;}
.g-head{display:flex;background:var(--surf2);}
.g-th{flex:1;padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);}
.g-th:first-child{flex:0 0 155px;}
.g-row{display:flex;border-top:1px solid var(--border);}
.g-td{flex:1;padding:6px 10px;color:var(--text);}
.g-td:first-child{flex:0 0 155px;color:var(--dim);font-weight:500;}
.g-row:nth-child(even){background:var(--surf2);}
.info-box{border-radius:var(--r);padding:9px 12px;font-size:12px;line-height:1.6;margin-top:6px;}
.info-tech{background:#3B82F610;border:1px solid #3B82F630;color:#93C5FD;}
.info-val{background:#F5A62310;border:1px solid #F5A62330;color:#FCD34D;}
.info-narr{background:#00C46C0C;border:1px solid #00C46C20;color:#6EE7B7;}
.target-table{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;font-size:12px;}
.target-head{display:grid;grid-template-columns:72px 70px 1fr 1fr 1fr 1fr;background:var(--surf2);}
.target-th{padding:7px 8px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);}
.target-row{display:grid;grid-template-columns:72px 70px 1fr 1fr 1fr 1fr;border-top:1px solid var(--border);}
.target-td{padding:8px 8px;font-family:var(--mono);font-size:12px;}
.target-row:nth-child(even){background:var(--surf2);}
.base-cell{font-weight:700;}
.cagr-inline{font-size:13px;font-weight:900;display:block;margin-top:1px;}
.drawer-foot{border-top:1px solid var(--border);padding:8px 18px;background:var(--surf2);display:flex;justify-content:space-between;font-size:10px;color:var(--dim2);flex-shrink:0;}
.entry-status{border-radius:var(--r);padding:9px 12px;font-size:12px;margin-top:4px;}
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ── -->
<div id="auth">
  <div class="auth-box" id="auth-box">
    <div class="auth-logo">IERP v3.0</div>
    <div class="auth-title" id="auth-title">Welcome Back</div>
    <div class="auth-sub" id="auth-sub">Sign in to your research platform</div>
    <div class="auth-err" id="auth-err"></div>
    <div id="auth-fields"></div>
  </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div id="settings-modal">
  <div class="settings-box">
    <div class="settings-title">⚙️ Settings</div>
    <label class="settings-label">Anthropic API Key</label>
    <input type="password" class="settings-input" id="s-apikey" placeholder="sk-ant-...">
    <div class="settings-note">Your API key is stored only in this browser. Never shared.</div>
    <div class="settings-sep"></div>
    <label class="settings-label">AI Model</label>
    <select class="model-select" id="s-model">
      <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (Fast · Low cost)</option>

// CRYPTO HELPERS

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  del: (k) => { try { localStorage.removeItem(k); } catch {} }
};

// MAOS ENGINE

function calcCAGR(cmp,target,n) {
  if (!cmp||!target||cmp<=0||target<=0) return null;
  return +(((Math.pow(target/cmp,1/n)-1)*100).toFixed(1));
}

function parseJSON(raw) {
  if (!raw) return null;
  let s = raw.trim().replace(/^```(?:json)?\s*/i,'').replace(/```\s*$/,'').trim();
  try { return JSON.parse(s); } catch {}
  let d=0,st=-1;
  for (let i=0;i<s.length;i++) {
    if (s[i]==='{') { if(!d)st=i; d++; }
    else if (s[i]==='}') { d--; if(!d&&st!==-1){try{return JSON.parse(s.slice(st,i+1));}catch{}st=-1;}}
  }
  return null;
}

  }
}

async function apiCall(prompt, sys) {
  const settings = ls.get(SK_SETTINGS) || {};
  const key   = settings.apiKey;
  const model = settings.model || 'claude-haiku-4-5-20251001';
  if (!key || key.length < 20) throw new Error('API key not set. Open Settings (⚙️) and enter your Anthropic API key.');

  let rawText = '';
  try {
    const body = { model, max_tokens: 3000, messages: [{ role:'user', content: prompt }] };
    if (sys) body.system = sys;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    rawText = await res.text();

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try { const e=JSON.parse(rawText); errMsg=e?.error?.message||errMsg; } catch {}
      if (res.status===401) throw new Error(`Invalid API key (401). Open ⚙️ Settings → check your key.\nRaw: ${rawText.slice(0,200)}`);
      if (res.status===403) throw new Error(`Access forbidden (403). Your key may not have API access.\nRaw: ${rawText.slice(0,200)}`);
      if (res.status===429) throw new Error('Rate limit hit (429). Wait 30 seconds and retry.');
      if (res.status===400) throw new Error(`Bad request (400): ${errMsg}\nRaw: ${rawText.slice(0,200)}`);
      throw new Error(`API error ${res.status}: ${errMsg}\nRaw: ${rawText.slice(0,200)}`);
    }

    const data = JSON.parse(rawText);
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if (!text) throw new Error(`API returned empty text.\nFull response: ${rawText.slice(0,300)}`);

    const parsed = parseJSON(text);
    if (!parsed) throw new Error(`Could not parse JSON.\nRaw text returned:\n"${text.slice(0,400)}"\n\nTip: retry — the model occasionally returns prose instead of JSON.`);
    return parsed;

  } catch(e) {
    if (e.message.includes('fetch') || e.message.includes('Failed') || e.message.includes('NetworkError') || e.name==='TypeError') {
      throw new Error(
        'Network error — cannot reach api.anthropic.com\n\n' +
        'SOLUTION: Open this file via a local web server instead of double-clicking:\n' +
        '  1. Open Terminal / Command Prompt\n' +
        '  2. Navigate to the folder containing this file\n' +
        '  3. Run: python -m http.server 8080\n' +
        '  4. Open Chrome and go to: http://localhost:8080\n' +
        '  5. Click the HTML file\n\n' +
        `Original error: ${e.message}`
      );
    }
    throw e;
  }
}

const SYS = `You are a senior India equity research analyst with deep knowledge of NSE/BSE listed companies.
Return ONLY valid JSON — no preamble, no explanation, no markdown fences.
Use your best knowledge for all fields. Use null only if genuinely unknown.
All monetary values are in Indian Rupees (INR). Fiscal year is April–March.`;

async function runMAOS(ticker, onStep) {
  const tk = ticker.trim().toUpperCase();
  if (!/^[A-Z0-9&\-]{1,20}$/.test(tk))
    throw new Error(`"${tk}" is not a valid NSE ticker format.`);

  // ── P2: SA-1+2+3 and SA-4+5+6 run in parallel ───────────────
  onStep('SA-1/2/3 — Market data, technicals, fundamentals', 15);

  const prompt1 = `NSE ticker: ${tk}
Return this JSON with real values for ${tk}:
{"name":"","sector":"BANKING","cmp":0,"hi52":0,"lo52":0,"mc":"","pe":0,"pb":0,"ev":0,"fpe":0,"dy":0,"rsi":50,"d50":0,"d200":0,"str":"Uptrend","s1":0,"s2":0,"r1":0,"r2":0,"tech":"2 sentence momentum narrative","roe":0,"roce":0,"de":0,"em":0,"rg":0,"fcf":"positive","k1n":"sector KPI 1","k1v":"value","k1b":"benchmark","k1s":"ABOVE","k2n":"sector KPI 2","k2v":"value","k2b":"benchmark","k2s":"AT"}
Rules: sector=BANKING|IT|TELECOM|FMCG|PHARMA|AUTO|ENERGY|METALS|INFRA|NBFC|REALTY|OTHER. str=Uptrend|Downtrend|Coiling|Breakout|Distribution|Accumulation|Range. k1s/k2s=ABOVE|AT|BELOW. k1n/k2n: the 2 most important sector-specific KPIs (e.g. NIM+GNPA for BANKING, ARPU+NetDebt/EBITDA for TELECOM). Return JSON only.`;

  const prompt2 = `NSE ticker: ${tk}
Return this JSON with real values for ${tk}:
{"mt":"moat type","rank":"market rank","pp":"pricing power description","risks":["risk1","risk2","risk3"],"ctp":0,"cr":"% BUY","vv":"FAIRLY_VALUED","pe5y":0,"peg":0,"dcf":0,"rfc":0,"vn":"valuation note","ec":0,"ea":0,"e1":0,"e3":0,"e5":0,"t1b":0,"t1m":0,"t1a":0,"t3b":0,"t3m":0,"t3a":0,"t5b":0,"t5m":0,"t5a":0,"bhs":"HOLD","st":"NEUTRAL","note":"2-3 sentence investment narrative"}
Rules: vv=UNDERVALUED|MARGINALLY_UNDERVALUED|FAIRLY_VALUED|MARGINALLY_OVERVALUED|OVERVALUED. bhs=BUY|HOLD|SELL. st=OPPORTUNITY|WATCH|NEUTRAL|CAUTION|RISK. ec=conservative entry price, ea=aggressive entry. t1b/t1m/t1a=1yr bear/base/aggressive targets. Same for t3 and t5. All prices are INR numbers >0. Return JSON only.`;

  const [r1, r2] = await Promise.all([
    apiCall(prompt1, SYS),
    apiCall(prompt2, SYS)
  ]);

  if (!r1.name && !r1.cmp) {
    throw new Error(
      `Could not get data for "${tk}".\n` +
      `Check that you are using the exact NSE symbol.\n` +
      `Examples: RELIANCE · HDFCBANK · TCS · BHARTIARTL · INFY\n` +
      `         WIPRO · ICICIBANK · BAJFINANCE · TATAMOTORS · SBIN\n\n` +
      `If you are sure the ticker is correct, please retry — the model occasionally needs a second attempt.`
    );
  }
  // Use safe fallbacks for any missing fields
  if (!r1.name) r1.name = tk;
  if (!r1.cmp || r1.cmp <= 0) r1.cmp = null;

  // ── P3: SA-7 CAGR Engine (pure arithmetic, no API call) ──────
  onStep('SA-7 — Computing CAGR (1Y / 3Y / 5Y)', 92);
  const cagr1Y = calcCAGR(r1.cmp, r2.t1m, 1);
  const cagr3Y = calcCAGR(r1.cmp, r2.t3m, 3);
  const cagr5Y = calcCAGR(r1.cmp, r2.t5m, 5);

  // ── P5: SA-8 Assemble StockRecord ────────────────────────────
  onStep('SA-8 — Saving to watchlist', 98);

  const valid = (arr,opts) => opts.includes(arr) ? arr : opts[Math.floor(opts.length/2)];

  return {
    ticker:           tk,
    companyName:      r1.name,
    sector:           r1.sector || 'OTHER',
    analysisDate:     new Date().toISOString(),
    // T1
    cmp:              r1.cmp,
    week52High:       r1.hi52,
    week52Low:        r1.lo52,
    marketCap:        r1.mc,
    pe:               r1.pe,
    pb:               r1.pb,
    evEbitda:         r1.ev,
    fwdPe:            r1.fpe,
    divYield:         r1.dy,
    pct52wLow:        r1.lo52 ? +(((r1.cmp-r1.lo52)/r1.lo52*100).toFixed(1)) : null,
    // T2
    rsi:              r1.rsi,
    dma50:            r1.d50,
    dma200:           r1.d200,
    priceStructure:   r1.str,
    support1:         r1.s1,
    support2:         r1.s2,
    resistance1:      r1.r1,
    resistance2:      r1.r2,
    momentumNarrative: r1.tech,
    // T3
    roe:              r1.roe,
    roce:             r1.roce,
    de:               r1.de,
    ebitdaMargin:     r1.em,
    revGrowth:        r1.rg,
    fcf:              r1.fcf,
    sectorKPIs: [
      { name:r1.k1n, value:r1.k1v, benchmark:r1.k1b, signal:r1.k1s },
      { name:r1.k2n, value:r1.k2v, benchmark:r1.k2b, signal:r1.k2s },
    ].filter(k=>k.name&&k.name.length>1),
    // T4
    moatType:         r2.mt,
    marketRank:       r2.rank,
    pricingPower:     r2.pp,
    keyRisks:         Array.isArray(r2.risks)?r2.risks.filter(Boolean):[],
    consensusTP:      r2.ctp,
    consensusRating:  r2.cr,
    // T5
    valuationVerdict: valid(r2.vv,['UNDERVALUED','MARGINALLY_UNDERVALUED','FAIRLY_VALUED','MARGINALLY_OVERVALUED','OVERVALUED']),
    pe5yMedian:       r2.pe5y,
    pegRatio:         r2.peg,
    dcfValue:         r2.dcf,
    redFlagCount:     r2.rfc,
    valuationNote:    r2.vn,
    // T6
    entryConservative: r2.ec,
    entryAggressive:  r2.ea,
    eps1Y:            r2.e1,
    eps3Y:            r2.e3,
    eps5Y:            r2.e5,
    target1YBear:     r2.t1b,
    target1YBase:     r2.t1m,
    target1YAggr:     r2.t1a,
    target3YBear:     r2.t3b,
    target3YBase:     r2.t3m,
    target3YAggr:     r2.t3a,
    target5YBear:     r2.t5b,
    target5YBase:     r2.t5m,
    target5YAggr:     r2.t5a,
    // SA-7 CAGR
    cagr1Y, cagr3Y, cagr5Y,
    // CA Verdict
    bhs:              valid(r2.bhs,['BUY','HOLD','SELL']),
    investmentStance: valid(r2.st,['OPPORTUNITY','WATCH','NEUTRAL','CAUTION','RISK']),
    narrative:        r2.note || ''
  };
}

// ════════════════════════════════════════════════════════════════
// FORMATTERS & STYLE HELPERS
// ════════════════════════════════════════════════════════════════
const inr  = n => n!=null&&!isNaN(n) ? '₹'+Number(n).toLocaleString('en-IN') : '—';
const fmtD = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
const ageD = d => !d ? 999 : Math.floor((Date.now()-new Date(d))/86400000);
const pN   = n => n!=null ? n : '—';

function cagrClass(v) {
  if (v==null) return 'cagr-na';
  if (v>25) return 'cagr-25'; if (v>20) return 'cagr-20';
  if (v>15) return 'cagr-15'; if (v>12) return 'cagr-12';
  if (v>8)  return 'cagr-8';  if (v>0)  return 'cagr-0';
  return 'cagr-neg';
}
function cagrColor(v) {
  if (v==null) return '#334155';
  if (v>25) return '#0B4F26'; if (v>20) return '#166534';
  if (v>15) return '#15803D'; if (v>12) return '#16A34A';
  if (v>8)  return '#D97706'; if (v>0)  return '#C2410C';
  return '#991B1B';
}
function bhsBg(b) {
  return b==='BUY'?'#00C46C':b==='SELL'?'#FF4757':'#F5A623';
}
function stanceBg(s) {
  return ({OPPORTUNITY:'#00C46C',WATCH:'#00A896',NEUTRAL:'#3A5A7A',CAUTION:'#D97706',RISK:'#FF4757'})[s]||'#3A5A7A';
}
function verdictBadge(v) {
  if (!v) return '<span class="badge badge-fair">—</span>';
  const short = v.replace('MARGINALLY_','M-').replace(/_/g,' ');
  const cls = v.includes('UNDER')?'badge-under':v==='FAIRLY_VALUED'?'badge-fair':'badge-over';
  return `<span class="badge ${cls}">${short}</span>`;
}
function cagrBadge(v) {
  const cls = cagrClass(v);
  return `<span class="badge ${cls}">${v!=null?v+'%':'N/A'}</span>`;
}
function bhsBadge(b) {
  const cls = b==='BUY'?'badge-buy':b==='SELL'?'badge-sell':'badge-hold';
  return `<span class="badge ${cls}">${b||'—'}</span>`;
}

function setProgress(step, pct) {
  document.getElementById('progress').style.display='block';
  document.getElementById('prog-step').textContent = step;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
}
function hideProgress() { document.getElementById('progress').style.display='none'; }
function showError(msg) {
  document.getElementById('error-bar').style.display='block';
  document.getElementById('err-text').textContent = msg;
}

// ════════════════════════════════════════════════════════════════
// ANALYSE HANDLER
// ════════════════════════════════════════════════════════════════
async function handleAnalyse() {
  if (STATE.analysing) return;
  const input = document.getElementById('ticker-input');
  const tk = input?.value.trim().toUpperCase();
  if (!tk) return;
  STATE.analysing = true;
  clearError();
  setProgress('QR-00 — Initialising analysis pipeline…', 5);
  document.getElementById('analyse-btn').disabled = true;
  document.getElementById('analyse-btn').textContent = 'Analysing…';

  try {
    const record = await runMAOS(tk, (step,pct) => setProgress(step,pct));
    STATE.stocks = [record, ...STATE.stocks.filter(s=>s.ticker!==record.ticker)];
    ls.set(SK_WATCHLIST, STATE.stocks);
    if (input) { input.value=''; }
    setView('watchlist');
  } catch(e) {
    showError(e.message);
  }

  STATE.analysing = false;
  hideProgress();
  if (document.getElementById('analyse-btn')) {
    document.getElementById('analyse-btn').disabled = false;
    document.getElementById('analyse-btn').textContent = 'Analyse';
  }
  updateSidebar();
  render();
}

function removeStock(ticker) {
  if (!confirm(`Remove ${ticker} from watchlist?`)) return;
  STATE.stocks = STATE.stocks.filter(s=>s.ticker!==ticker);
  ls.set(SK_WATCHLIST, STATE.stocks);
  closeDrawer();
  updateSidebar();
  render();
}

const LEGEND_HTML = `<div class="hm-legend">
  <span class="hm-legend-label">CAGR band:</span>
  ${[['>25%','#0B4F26'],['20-25%','#166534'],['15-20%','#15803D'],['12-15%','#16A34A'],
    ['8-12%','#D97706'],['0-8%','#C2410C'],['<0%','#991B1B']].map(([l,c])=>
    `<span class="badge" style="background:${c};color:#fff;">${l}</span>`).join('')}
</div>`;

function heatPanel(title, stocks, cagrKey, headBg) {
  const sorted = [...stocks].sort((a,b)=>(b[cagrKey]??-999)-(a[cagrKey]??-999));
  const valid  = sorted.filter(s=>s[cagrKey]!=null);
  const avg    = valid.length ? (valid.reduce((a,s)=>a+s[cagrKey],0)/valid.length).toFixed(1) : null;
  const cells  = sorted.map(s => {
    const col = cagrColor(s[cagrKey]);
    const val = s[cagrKey]!=null ? s[cagrKey]+'%' : 'N/A';
    const bColor = bhsBg(s.bhs);
    return `<div class="hm-cell" style="background:${col}" onclick="openDrawer('${s.ticker}')">
      <div class="hm-cell-tk">${s.ticker}</div>
      <div class="hm-cell-sec">${s.sector}</div>
      <div class="hm-cell-cagr">${val}</div>
      <div class="hm-cell-bhs" style="color:${bColor}">${s.bhs||'—'}</div>
    </div>`;
  }).join('');
  return `<div class="hm-panel">
    <div class="hm-panel-head" style="background:${headBg}">
      <span class="hm-panel-title">${title}</span>
      ${avg?`<span class="hm-panel-avg">avg ${avg}%</span>`:''}
    </div>
    <div class="hm-cells">${cells||'<div style="color:var(--dim);font-size:13px;">No stocks</div>'}</div>
  </div>`;
}

      ['EV/EBITDA',s.evEbitda!=null?s.evEbitda+'x':null],
      ['Dividend Yield',s.divYield!=null?s.divYield+'%':null],
      ['% Above 52W Low',s.pct52wLow!=null?'+'+s.pct52wLow+'%':null],
    ])}

    <div class="sec-title">T2 — Technical Picture</div>
    ${gt(['Indicator','Reading','Signal'],[
      ['RSI',s.rsi||'—', s.rsi<=35?'🟢 Oversold — watch for base':s.rsi>=70?'🔴 Overbought — caution':'🟡 Neutral zone'],
      ['50 DMA',inr(s.dma50), s.cmp&&s.dma50?s.cmp>s.dma50?'✅ Price above':'⚠️ Price below':'—'],
      ['200 DMA',inr(s.dma200), vs200!=null?vs200>=0?`✅ +${vs200}% — bullish structure`:`🔴 ${vs200}% — bearish structure`:'—'],
      ['Support',`${inr(s.support1)} / ${inr(s.support2)}`,'Key demand zones'],
      ['Resistance',`${inr(s.resistance1)} / ${inr(s.resistance2)}`,'Supply zones / targets'],
      ['Structure',s.priceStructure||'—','Current price formation'],
    ])}
    ${s.momentumNarrative?`<div class="info-box info-tech" style="margin-top:6px">📊 ${s.momentumNarrative}</div>`:''}

    <div class="sec-title">T3 — Fundamentals vs Benchmark</div>
    ${gt(['Metric','Value','vs Benchmark'],[
      ['ROE',s.roe!=null?s.roe+'%':'—','—'],
      ['ROCE',s.roce!=null?s.roce+'%':'—','—'],
      ['Debt / Equity',s.de!=null?s.de+'x':'—',s.de>2?'⚠️ Elevated':s.de>0?'✅ Manageable':'—'],
      ['Revenue Growth',s.revGrowth!=null?s.revGrowth+'%':'—','YoY'],
      ['EBITDA Margin',s.ebitdaMargin!=null?s.ebitdaMargin+'%':'—','—'],
      ['FCF',s.fcf||'—','—'],
      ...(s.sectorKPIs||[]).map(k=>[k.name,k.value,`<span style="color:${k.signal==='ABOVE'?'#00C46C':k.signal==='BELOW'?'#FF4757':'#F5A623'}">${k.signal==='ABOVE'?'✅':'⚠️'} vs ${k.benchmark}</span>`])
    ])}

    <div class="sec-title">T4 — Moat & Competitive Command</div>
    ${kv([
      ['Moat Type',s.moatType],
      ['Market Rank',s.marketRank],
      ['Pricing Power',s.pricingPower],
      ['Key Risks',(s.keyRisks||[]).join(' · ')||null],
      ['Consensus TP',s.consensusTP?`${inr(s.consensusTP)} <span style="color:var(--buy);font-weight:700">+${tpUp}%</span>`:null],
      ['Analyst Rating',s.consensusRating],
    ])}

    <div class="sec-title">T5 — Valuation</div>
    ${gt(['Dimension','Value','Signal'],[
      ['Valuation Verdict',verdictBadge(s.valuationVerdict),'—'],
      ['PEG Ratio',s.pegRatio!=null?s.pegRatio+'x':'—', s.pegRatio<0.9?'✅ Growth not priced in':s.pegRatio>1.3?'🔴 Growth expensive':'⚠️ Fair'],
      ['DCF Value',inr(s.dcfValue), s.dcfValue&&s.cmp?s.cmp<s.dcfValue?`✅ CMP is ${((s.dcfValue-s.cmp)/s.dcfValue*100).toFixed(0)}% below DCF`:`⚠️ CMP is ${((s.cmp-s.dcfValue)/s.dcfValue*100).toFixed(0)}% above DCF`:'—'],
      ['5Y P/E Median',s.pe5yMedian!=null?s.pe5yMedian+'x':'—','Historical anchor'],
      ['Red Flags',s.redFlagCount!=null?s.redFlagCount:'—',s.redFlagCount===0?'✅ Clean':s.redFlagCount>=3?'🔴 Value trap risk':'⚠️ Watch'],
    ])}
    ${s.valuationNote?`<div class="info-box info-val" style="margin-top:6px">💬 ${s.valuationNote}</div>`:''}

    <div class="sec-title">T6A — Entry Price</div>
    ${gt(['Method','Conservative','Aggressive'],[
      ['DCF + Margin of Safety',inr(s.entryConservative),inr(s.entryAggressive)],
      ['PEG Check','< 0.9x','≤ 1.1x'],
      ['Technical','RSI <45 + 200 DMA reclaim','RSI 45-55 + MACD cross'],
    ])}
    ${cmpEntry?`<div class="entry-status" style="background:${cmpEntry.bg};border:1px solid ${cmpEntry.bc};color:${cmpEntry.c};margin-top:6px;font-size:12px">${cmpEntry.txt}</div>`:''}

    <div class="sec-title">T6B — Target Price + CAGR (Base Scenario)</div>
    <div class="target-table">
      <div class="target-head">
        <div class="target-th">Horizon</div>
        <div class="target-th">EPS Est.</div>
        <div class="target-th">Bear</div>
        <div class="target-th">Base ★</div>
        <div class="target-th">Aggressive</div>
        <div class="target-th">CAGR</div>
      </div>
      ${[
        {lbl:'1 Year',eps:s.eps1Y,bear:s.target1YBear,base:s.target1YBase,aggr:s.target1YAggr,cagr:s.cagr1Y},
        {lbl:'3 Years',eps:s.eps3Y,bear:s.target3YBear,base:s.target3YBase,aggr:s.target3YAggr,cagr:s.cagr3Y},
        {lbl:'5 Years',eps:s.eps5Y,bear:s.target5YBear,base:s.target5YBase,aggr:s.target5YAggr,cagr:s.cagr5Y},
      ].map((r,i)=>{
        const col=cagrColor(r.cagr);
        return `<div class="target-row" style="${i%2?'background:var(--surf2)':''}">
          <div class="target-td" style="font-weight:700">${r.lbl}</div>
          <div class="target-td">${r.eps?'₹'+r.eps:'—'}</div>
          <div class="target-td" style="color:var(--dim)">${inr(r.bear)}</div>
          <div class="target-td base-cell" style="background:${col}20;color:${col}">${inr(r.base)}</div>
          <div class="target-td">${inr(r.aggr)}</div>
          <div class="target-td" style="background:${col};color:#fff;font-weight:900">${r.cagr!=null?r.cagr+'% p.a.':'—'}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:var(--dim2);margin-top:4px;font-style:italic">★ CAGR = [(Base Target ÷ CMP)^(1/N)−1]×100 · Base scenario only · Estimates — not a guarantee</div>
  `;

  document.getElementById('d-body').innerHTML = html;
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').style.display='none';
}

// ════════════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════════════
function render() {
  renderTopbarControls();
  updateSidebar();
  const content = document.getElementById('content');
  switch (STATE.view) {
    case 'watchlist': content.innerHTML = renderWatchlist(); break;
    case 'cagr':      content.innerHTML = renderCAGR();      break;
    case 'sector':    content.innerHTML = renderSector();    break;
    case 'bhs':       content.innerHTML = renderBHS();       break;
  }
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
initAuth();
</script>
</body>
</html>
